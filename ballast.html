<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MBI — Ballast Calculator</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    height:100%; background:#05070a; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center;
  }
  .app { width:100%; max-width:380px; padding:16px; }
  .logo { text-align:center; margin-bottom:28px; }
  .logo-sub { font-size:11px; color:#8b949e; margin-top:6px; letter-spacing:2px; text-transform:uppercase; }
  .card { display:block; text-decoration:none; background:#0d1117; border-radius:16px;
    border:2px solid #21262d; padding:20px; margin-bottom:14px; transition:all .25s;
    box-shadow:0 4px 16px rgba(0,0,0,.4); }
  .card:active { transform:scale(.98); }
  .card.mamba { border-color:#238636; }
  .card.pike  { border-color:#1a73e8; }
  .card-header { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .card-icon { font-size:32px; }
  .card-name { font-size:18px; font-weight:800; color:#fff; }
  .card-sub  { font-size:11px; color:#8b949e; margin-top:2px; }
  .card-body { font-size:11px; color:#8b949e; line-height:1.6; padding-left:44px; }
  .badge { display:inline-block; padding:2px 8px; border-radius:10px;
    font-size:10px; font-weight:700; margin-right:4px; margin-top:4px; }
  .bg { background:rgba(63,185,80,.15);  color:#3fb950; border:1px solid rgba(63,185,80,.3); }
  .bb { background:rgba(26,115,232,.15); color:#1a73e8; border:1px solid rgba(26,115,232,.3); }
  .bo { background:rgba(200,160,48,.15); color:#c8a030; border:1px solid rgba(200,160,48,.3); }
  .bt { background:rgba(68,136,204,.15); color:#4488cc; border:1px solid rgba(68,136,204,.3); }
  .arrow { float:right; font-size:20px; color:#30363d; margin-top:-28px; }
  .footer { text-align:center; margin-top:20px; font-size:10px; color:#30363d; letter-spacing:.5px; }
</style>
</head>
<body>
<div class="app">
  <div class="logo">

    <svg viewBox="0 0 360 110" xmlns="http://www.w3.org/2000/svg" width="100%" style="max-width:360px">
      <defs>
        <linearGradient id="redgrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#cc0000"/>
          <stop offset="50%" stop-color="#ff2222"/>
          <stop offset="100%" stop-color="#880000"/>
        </linearGradient>
        <linearGradient id="whitegrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#aaaaaa"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="redglow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Fond sombre arrondi -->
      <rect x="2" y="2" width="356" height="106" rx="12" fill="#111318" stroke="#2a2a2a" stroke-width="1"/>

      <!-- Lignes de vitesse gauche -->
      <line x1="5"  y1="48" x2="55" y2="52" stroke="#cc0000" stroke-width="1.5" opacity=".6"/>
      <line x1="2"  y1="58" x2="50" y2="57" stroke="#cc0000" stroke-width="1"   opacity=".4"/>
      <line x1="8"  y1="40" x2="45" y2="45" stroke="#cc0000" stroke-width=".8"  opacity=".3"/>
      <line x1="4"  y1="68" x2="42" y2="64" stroke="#cc0000" stroke-width=".8"  opacity=".3"/>

      <!-- Lignes de vitesse droite -->
      <line x1="355" y1="48" x2="305" y2="52" stroke="#cc0000" stroke-width="1.5" opacity=".6"/>
      <line x1="358" y1="58" x2="310" y2="57" stroke="#cc0000" stroke-width="1"   opacity=".4"/>
      <line x1="352" y1="40" x2="315" y2="45" stroke="#cc0000" stroke-width=".8"  opacity=".3"/>
      <line x1="356" y1="68" x2="318" y2="64" stroke="#cc0000" stroke-width=".8"  opacity=".3"/>

      <!-- ═══ PLANEUR F3F vue de dessus ═══ -->
      <!-- Aile gauche arrière -->
      <path d="M148 55 L60 30 L65 40 L130 57 Z" fill="url(#redgrad)" opacity=".9" filter="url(#redglow)"/>
      <!-- Aile gauche avant -->
      <path d="M148 55 L62 28 L68 22 L135 50 Z" fill="#cc0000" opacity=".7"/>
      <!-- Winglet gauche -->
      <path d="M60 30 L55 25 L68 22 L65 30 Z" fill="#ff4444" opacity=".8"/>

      <!-- Aile droite arrière -->
      <path d="M148 55 L60 80 L65 70 L130 58 Z" fill="url(#redgrad)" opacity=".9" filter="url(#redglow)"/>
      <!-- Aile droite avant -->
      <path d="M148 55 L62 82 L68 88 L135 60 Z" fill="#cc0000" opacity=".7"/>
      <!-- Winglet droit -->
      <path d="M60 80 L55 85 L68 88 L65 80 Z" fill="#ff4444" opacity=".8"/>

      <!-- Fuselage -->
      <path d="M80 54 Q120 50 148 54 Q200 55 230 54 Q240 54 245 55 Q240 56 230 56 Q200 57 148 57 Q120 60 80 57 Z"
            fill="url(#whitegrad)" opacity=".95"/>
      <!-- Nez -->
      <path d="M80 54 L70 55 L80 57 Z" fill="#ffffff"/>

      <!-- Empennage horizontal gauche -->
      <path d="M230 54 L270 44 L272 48 L235 55 Z" fill="#cc0000" opacity=".85"/>
      <!-- Empennage horizontal droit -->
      <path d="M230 56 L270 66 L272 62 L235 56 Z" fill="#cc0000" opacity=".85"/>
      <!-- Empennage vertical -->
      <path d="M232 55 L255 47 L256 49 L234 55 L256 61 L255 63 Z" fill="#ff3333" opacity=".6"/>

      <!-- Reflet sur fuselage -->
      <path d="M90 52 Q140 50 230 52" stroke="rgba(255,255,255,.3)" stroke-width=".8" fill="none"/>

      <!-- ═══ TEXTE F3F ═══ -->
      <!-- Ombre rouge -->
      <text x="158" y="80" font-family="Arial Black, Impact, sans-serif" font-size="42"
            font-weight="900" fill="#cc0000" opacity=".5" transform="skewX(-8)" filter="url(#redglow)">F3F</text>
      <!-- Texte blanc principal -->
      <text x="155" y="78" font-family="Arial Black, Impact, sans-serif" font-size="42"
            font-weight="900" fill="url(#whitegrad)" transform="skewX(-8)" filter="url(#glow)">F3F</text>
      <!-- Contour rouge -->
      <text x="155" y="78" font-family="Arial Black, Impact, sans-serif" font-size="42"
            font-weight="900" fill="none" stroke="#cc0000" stroke-width="1.5"
            transform="skewX(-8)">F3F</text>

      <!-- Trait décoratif sous F3F -->
      <path d="M152 83 L262 83" stroke="url(#redgrad)" stroke-width="2" opacity=".8"/>
      <path d="M155 86 L259 86" stroke="#cc0000" stroke-width="1" opacity=".4"/>

      <!-- MBI petit -->
      <text x="178" y="99" font-family="Arial, sans-serif" font-size="11"
            font-weight="700" fill="#888" letter-spacing="6">MBI</text>
    </svg>

    <div class="logo-sub">Ballast Calculateurs</div>
  </div>

  <a href="calculateur-ballast-mamba-v10.html" class="card mamba">
    <div class="card-header">
      <span class="card-icon">🦅</span>
      <div>
        <div class="card-name">Mamba F3F</div>
        <div class="card-sub">Calculateur principal</div>
      </div>
    </div>
    <div class="card-body">
      <span class="badge bg">2550g vide</span>
      <span class="badge bg">CG 102mm</span>
      <span class="badge bg">AV · C · AR</span>
      <span class="badge bg">Table + ISA</span>
    </div>
    <div class="arrow">›</div>
  </a>

  <a href="pike2.html" class="card pike">
    <div class="card-header">
      <span class="card-icon">🎯</span>
      <div>
        <div class="card-name">Pike Precision 2</div>
        <div class="card-sub">v2 — GPS Log</div>
      </div>
    </div>
    <div class="card-body">
      <span class="badge bb">2350g vide</span>
      <span class="badge bb">CG 97mm</span>
      <span class="badge bo">Laiton 42g · 126g</span>
      <span class="badge bt">Tungstène 77g</span>
      <span class="badge bb">📍 GPS Log</span>
    </div>
    <div class="arrow">›</div>
  </a>

  <div class="footer">acjtechnologies-cpu · MBI · 2026</div>
</div>
</body>
</html>
